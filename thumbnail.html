<!DOCTYPE html>
<html>
<head>
  <title>AI Thumbnail Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>AI Thumbnail Prompt Generator</h1>
  <p>Create viral YouTube thumbnail prompts.</p>

  <input id="thumbTopic" type="text" placeholder="Enter video topic">

  <select id="thumbStyle">
    <option value="3D cartoon style">3D Cartoon</option>
    <option value="cinematic realistic style">Cinematic Realistic</option>
    <option value="horror dark style">Horror</option>
    <option value="gaming neon style">Gaming</option>
  </select>

  <button onclick="generateThumbnail()">Generate Thumbnail Prompt</button>
  <button onclick="copyThumbnail()">Copy</button>

  <div id="thumbResult"></div>

  <br>
  <a href="index.html">
    <button>⬅ Back to Home</button>
  </a>
</div>

<script src="thumbnail.js"></script>
</body>
</html>
